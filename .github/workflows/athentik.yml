name: Mirror Authentik to Docker Hub

on:
  schedule:
    - cron: '0 2 * * *'  # روزانه ساعت 2 صبح
  workflow_dispatch:  # اجرای دستی

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Pull from GHCR
        run: |
          docker pull ghcr.io/goauthentik/server:2026.2.3
          docker pull ghcr.io/goauthentik/server:latest
      
      - name: Tag for Docker Hub
        run: |
          docker tag ghcr.io/goauthentik/server:2026.2.3 ${{ secrets.DOCKERHUB_USERNAME }}/authentik-server:2026.2.3
          docker tag ghcr.io/goauthentik/server:latest ${{ secrets.DOCKERHUB_USERNAME }}/authentik-server:latest
      
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authentik-server:2026.2.3
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authentik-server:latest
