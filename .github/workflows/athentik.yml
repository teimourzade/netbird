name: Mirror Authentik to Docker Hub

on:
  schedule:
    # هر روز ساعت 2 صبح (UTC) چک می‌کند
    - cron: '0 2 * * *'
  workflow_dispatch:  # اجرای دستی

jobs:
  mirror:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get latest Authentik version
        id: get_version
        run: |
          # دریافت آخرین تگ از GitHub API
          LATEST_VERSION=$(curl -s https://api.github.com/repos/goauthentik/authentik/releases/latest | jq -r .tag_name)
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest version: $LATEST_VERSION"

      - name: Check if version already exists on Docker Hub
        id: check_exists
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          # بررسی وجود تگ در Docker Hub
          if docker manifest inspect ${{ secrets.DOCKERHUB_USERNAME }}/authentik:${VERSION} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} already exists on Docker Hub"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${VERSION} does not exist, will mirror"
          fi

      - name: Pull from ghcr.io
        if: steps.check_exists.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          docker pull ghcr.io/goauthentik/server:${VERSION}

      - name: Tag for Docker Hub
        if: steps.check_exists.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          docker tag ghcr.io/goauthentik/server:${VERSION} ${{ secrets.DOCKERHUB_USERNAME }}/authentik:${VERSION}
          docker tag ghcr.io/goauthentik/server:${VERSION} ${{ secrets.DOCKERHUB_USERNAME }}/authentik:latest

      - name: Push to Docker Hub
        if: steps.check_exists.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authentik:${VERSION}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/authentik:latest

      - name: Create release summary
        if: steps.check_exists.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "✅ Successfully mirrored Authentik ${VERSION} to Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Images pushed:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/authentik:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/authentik:latest\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip summary
        if: steps.check_exists.outputs.exists == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "ℹ️ Version ${VERSION} already exists on Docker Hub, skipping" >> $GITHUB_STEP_SUMMARY
