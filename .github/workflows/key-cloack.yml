# .github/workflows/mirror.yml
name: Mirror quay.io to Docker Hub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # هر روز ساعت ۰۰:۰۰

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull, tag, and push
        run: |
          docker pull quay.io/keycloak/keycloak:23.0
          docker tag  quay.io/keycloak/keycloak:23.0 ${{ secrets.DOCKERHUB_USERNAME }}/keycloak:23.0
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/keycloak:23.0
