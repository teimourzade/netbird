name: Mirror Images to Docker Hub

on:
  workflow_dispatch: # اجرای دستی

jobs:
  mirror-images:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Mirror Zitadel
        run: docker buildx imagetools create ghcr.io/zitadel/zitadel:latest -t gh0ghnu3/zitadel:latest

      - name: Mirror NetBird Management
        run: docker buildx imagetools create netbirdio/management:latest -t gh0ghnu3/management:latest

      - name: Mirror NetBird Signal
        run: docker buildx imagetools create netbirdio/signal:latest -t gh0ghnu3/signal:latest

      - name: Mirror NetBird Dashboard
        run: docker buildx imagetools create netbirdio/dashboard:latest -t gh0ghnu3/dashboard:latest

      - name: Mirror PostgreSQL
        run: docker buildx imagetools create postgres:16-alpine -t gh0ghnu3/postgres:16-alpine

