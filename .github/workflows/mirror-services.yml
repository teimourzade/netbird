name: Mirror Zitadel and Netbird

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Zitadel (GHCR)
          - src: ghcr.io/zitadel/zitadel
            dst: zitadel-mirror
            tag: latest
            registry: ghcr

          # Netbird (GHCR)
          - src: ghcr.io/netbirdio/netbird
            dst: netbird-client-mirror
            tag: latest
            registry: ghcr

          - src: ghcr.io/netbirdio/management
            dst: netbird-management-mirror
            tag: latest
            registry: ghcr

          - src: ghcr.io/netbirdio/signal
            dst: netbird-signal-mirror
            tag: latest
            registry: ghcr

          # Dashboard (ONLY DockerHub)
          - src: netbirdio/dashboard
            dst: netbird-dashboard-mirror
            tag: latest
            registry: dockerhub

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror GHCR manifests
        if: matrix.registry == 'ghcr'
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.dst }}:${{ matrix.tag }} \
            ${{ matrix.src }}:${{ matrix.tag }}

      - name: Pull/Tag/Push for DockerHub-only images
        if: matrix.registry == 'dockerhub'
        run: |
          docker pull ${{ matrix.src }}:${{ matrix.tag }}
          docker tag ${{ matrix.src }}:${{ matrix.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.dst }}:${{ matrix.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.dst }}:${{ matrix.tag }}
