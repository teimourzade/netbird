name: Mirror Zitadel and Netbird (Lightweight Mirror)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Zitadel
          - src: ghcr.io/zitadel/zitadel
            dst: zitadel-mirror
            tag: latest

          # Netbird
          - src: ghcr.io/netbirdio/netbird
            dst: netbird-client-mirror
            tag: latest
          - src: ghcr.io/netbirdio/management
            dst: netbird-management-mirror
            tag: latest
          - src: ghcr.io/netbirdio/dashboard
            dst: netbird-dashboard-mirror
            tag: latest
          - src: ghcr.io/netbirdio/signal
            dst: netbird-signal-mirror
            tag: latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror image manifest (no layer push)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.dst }}:${{ matrix.tag }} \
            ${{ matrix.src }}:${{ matrix.tag }}
